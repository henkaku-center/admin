<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henkaku & SDS Infrastructure Map</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-dim: #1f6feb33;
            --green: #3fb950;
            --orange: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header img { height: 28px; width: 28px; }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        header .updated {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        nav.toc {
            position: fixed;
            left: 0;
            top: 61px;
            bottom: 0;
            width: 260px;
            overflow-y: auto;
            padding: 16px 0;
            border-right: 1px solid var(--border);
            background: var(--surface);
            font-size: 13px;
        }

        nav.toc a {
            display: block;
            padding: 4px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-left: 2px solid transparent;
            transition: all 0.15s;
        }

        nav.toc a:hover, nav.toc a.active {
            color: var(--text);
            border-left-color: var(--accent);
            background: var(--accent-dim);
        }

        nav.toc a.depth-1 { font-weight: 600; padding-left: 16px; margin-top: 8px; }
        nav.toc a.depth-2 { padding-left: 28px; }
        nav.toc a.depth-3 { padding-left: 40px; font-size: 12px; }

        main {
            margin-left: 260px;
            max-width: 960px;
            padding: 32px 48px 120px;
        }

        /* Markdown content styles */
        main h1 { font-size: 28px; margin: 0 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        main h2 { font-size: 22px; margin: 40px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--accent); }
        main h3 { font-size: 17px; margin: 28px 0 12px; color: var(--text); }
        main h4 { font-size: 15px; margin: 20px 0 8px; color: var(--text-muted); }

        main p { margin: 8px 0; }
        main blockquote {
            border-left: 3px solid var(--accent);
            padding: 8px 16px;
            margin: 16px 0;
            color: var(--text-muted);
            background: var(--accent-dim);
            border-radius: 0 6px 6px 0;
        }

        main blockquote:first-of-type {
            border-left: 4px solid var(--orange);
            background: #d2992233;
            color: var(--text);
            padding: 16px 20px;
            font-size: 15px;
            border-radius: 0 8px 8px 0;
        }

        main ul, main ol { margin: 8px 0; padding-left: 24px; }
        main li { margin: 4px 0; }
        main li strong { color: var(--accent); }

        main hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        main a { color: var(--accent); text-decoration: none; }
        main a:hover { text-decoration: underline; }

        main code {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 0.9em;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        main pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
        }

        main pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Tables */
        main table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 14px;
        }

        main thead th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        main tbody td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        main tbody tr:hover { background: var(--accent-dim); }

        /* Mermaid diagrams */
        .mermaid-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin: 16px 0;
            overflow-x: auto;
            text-align: center;
        }

        .mermaid-container svg { max-width: 100%; height: auto; }
        .mermaid-container svg .mindmap-node text,
        .mermaid-container svg .mindmap-node foreignObject div { color: #fff !important; fill: #fff !important; }

        /* Responsive */
        @media (max-width: 900px) {
            nav.toc { display: none; }
            main { margin-left: 0; padding: 24px 16px 80px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <img src="../compass-icon.png" alt="">
        <h1>Henkaku & SDS Infrastructure Map</h1>
        <span class="updated">April 2026</span>
    </header>
    <nav class="toc" id="toc"></nav>
    <main id="content">Loading...</main>

    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#161b22',
                primaryColor: '#1f6feb',
                primaryTextColor: '#e6edf3',
                primaryBorderColor: '#30363d',
                lineColor: '#8b949e',
                secondaryColor: '#21262d',
                tertiaryColor: '#161b22',
                noteTextColor: '#e6edf3',
                noteBkgColor: '#161b22',
                fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif',
                fontSize: '14px'
            },
            mindmap: { fontSize: 14 },
            flowchart: { curve: 'basis', padding: 16 },
            er: { fontSize: 12 }
        });

        const renderer = new marked.Renderer();

        // Collect mermaid blocks to render after HTML insertion
        let mermaidBlocks = [];

        renderer.code = function(obj) {
            const text = obj.text || obj;
            const lang = obj.lang || '';
            if (lang === 'mermaid') {
                const id = 'mermaid-' + mermaidBlocks.length;
                mermaidBlocks.push({ id, text });
                return `<div class="mermaid-container"><div class="mermaid" id="${id}">${text}</div></div>`;
            }
            const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return `<pre><code class="language-${lang}">${escaped}</code></pre>`;
        };

        marked.setOptions({ renderer, gfm: true, breaks: false });

        async function loadAndRender() {
            const res = await fetch('../INFRASTRUCTURE.md');
            const md = await res.text();

            mermaidBlocks = [];
            const html = marked.parse(md);
            document.getElementById('content').innerHTML = html;

            // Render mermaid diagrams
            for (const block of mermaidBlocks) {
                try {
                    const { svg } = await mermaid.render(block.id + '-svg', block.text);
                    document.getElementById(block.id).innerHTML = svg;
                } catch (e) {
                    console.warn('Mermaid render failed for', block.id, e);
                    document.getElementById(block.id).textContent = block.text;
                }
            }

            buildTOC();
            observeHeadings();
        }

        function buildTOC() {
            const headings = document.querySelectorAll('main h1, main h2, main h3');
            const toc = document.getElementById('toc');
            toc.innerHTML = '';

            headings.forEach((h, i) => {
                const id = 'section-' + i;
                h.id = id;
                const depth = parseInt(h.tagName[1]);
                const a = document.createElement('a');
                a.href = '#' + id;
                a.textContent = h.textContent;
                a.className = 'depth-' + depth;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    history.replaceState(null, '', '#' + id);
                });
                toc.appendChild(a);
            });
        }

        function observeHeadings() {
            const links = document.querySelectorAll('nav.toc a');
            const headings = document.querySelectorAll('main h1[id], main h2[id], main h3[id]');

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        links.forEach(l => l.classList.remove('active'));
                        const active = document.querySelector(`nav.toc a[href="#${entry.target.id}"]`);
                        if (active) active.classList.add('active');
                    }
                });
            }, { rootMargin: '-80px 0px -70% 0px' });

            headings.forEach(h => observer.observe(h));
        }

        loadAndRender();
    </script>
</body>
</html>
